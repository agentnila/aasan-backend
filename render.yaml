services:
  - type: web
    name: aasan-peraasan-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: MEM0_API_KEY
        sync: false
      - key: API_SECRET
        sync: false
